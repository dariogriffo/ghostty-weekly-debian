name: Build Ghostty for Debian

on:
  schedule:
    # Runs every Friday at 04:00 UTC
    - cron: '0 4 * * 5'
  workflow_dispatch:
    inputs:
      build_version:
        description: Debian build revision (defaults to 1).
        type: string
        required: false
        default: '1'

permissions:
  contents: write

jobs:
  build-ghostty:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ghostty-weekly-debian
        uses: actions/checkout@v4

      - name: Build Ghostty
        run: ./build_ghostty_debian.sh "${{ inputs.build_version || '1' }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: |
            ghostty-tip_*.deb
            libghostty-vt0-tip_*.deb
            libghostty-vt-dev-tip_*.deb
            ghostty-tip.version

  release-ghostty:
    name: (Draft-)Release Ghostty for Debian
    runs-on: ubuntu-latest
    needs: build-ghostty
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifact

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          # shellcheck disable=SC1091
          source ghostty-tip.version
          {
            echo "GHOSTTY_SHA=$GHOSTTY_SHA"
            echo "BUILD_DATE=$BUILD_DATE"
            echo "APP_VERSION=$APP_VERSION"
            echo "UPSTREAM_VERSION=$UPSTREAM_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ghostty-tip_*.deb
            libghostty-vt0-tip_*.deb
            libghostty-vt-dev-tip_*.deb
          name: "Ghostty ${{ steps.ver.outputs.APP_VERSION }} (tip ${{ steps.ver.outputs.BUILD_DATE }})"
          tag_name: tip-${{ steps.ver.outputs.BUILD_DATE }}
          body: |
            Weekly build of Ghostty from the upstream `tip` tag.

            - Upstream app version: `${{ steps.ver.outputs.APP_VERSION }}`
            - Upstream commit: [`${{ steps.ver.outputs.GHOSTTY_SHA }}`](https://github.com/ghostty-org/ghostty/commit/${{ steps.ver.outputs.GHOSTTY_SHA }})
            - Build date (UTC): `${{ steps.ver.outputs.BUILD_DATE }}`
            - Debian package version: `${{ steps.ver.outputs.UPSTREAM_VERSION }}-1+<dist>`
          fail_on_unmatched_files: true
